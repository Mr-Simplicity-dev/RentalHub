<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalHub — All Devices Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0284c7 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 60px 20px;
    overflow-x: hidden;
  }

  .scene {
    display: flex;
    align-items: flex-end;
    gap: 0;
    position: relative;
    max-width: 1100px;
  }

  .placeholder-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── MONITOR ── */
  .monitor {
    position: relative;
    z-index: 1;
    margin-right: -30px;
  }
  .monitor-screen {
    width: 480px;
    height: 310px;
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px 10px 6px 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .monitor-display {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 3px;
    overflow: hidden;
  }
  .monitor-display .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0284c7 0%, #0f172a 100%);
    color: white;
    text-align: center;
    padding: 20px;
  }
  .monitor-neck {
    width: 40px;
    height: 40px;
    background: #999;
    margin: 0 auto;
  }
  .monitor-base {
    width: 120px;
    height: 8px;
    background: #888;
    margin: 0 auto;
    border-radius: 3px;
  }

  /* ── LAPTOP ── */
  .laptop {
    position: relative;
    z-index: 3;
    margin-left: -40px;
    margin-bottom: 0;
  }
  .laptop-screen {
    width: 380px;
    height: 250px;
    background: #1a1a1a;
    border-radius: 10px 10px 0 0;
    padding: 8px 8px 5px 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .laptop-display {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 3px;
    overflow: hidden;
  }
  .laptop-display .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0284c7 0%, #0f172a 100%);
    color: white;
    text-align: center;
    padding: 16px;
  }
  .laptop-base {
    width: 420px;
    height: 12px;
    background: linear-gradient(180deg, #c0c0c0 0%, #a0a0a0 50%, #888 100%);
    border-radius: 0 0 6px 6px;
    margin-left: -20px;
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .laptop-base::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 4px;
    background: #999;
    border-radius: 0 0 4px 4px;
  }

  /* ── TABLET ── */
  .tablet {
    position: relative;
    z-index: 4;
    margin-left: -20px;
    margin-bottom: 30px;
  }
  .tablet-device {
    width: 220px;
    height: 300px;
    background: #1a1a1a;
    border-radius: 16px;
    padding: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transform: rotate(3deg);
  }
  .tablet-display {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 8px;
    overflow: hidden;
  }
  .tablet-display .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0284c7 0%, #0f172a 100%);
    color: white;
    text-align: center;
    padding: 14px;
  }

  /* ── PHONE ── */
  .phone {
    position: relative;
    z-index: 5;
    margin-left: -10px;
    margin-bottom: 20px;
  }
  .phone-device {
    width: 140px;
    height: 290px;
    background: #1a1a1a;
    border-radius: 22px;
    padding: 7px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: rotate(-2deg);
  }
  .phone-notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 14px;
    background: #1a1a1a;
    border-radius: 0 0 10px 10px;
    z-index: 10;
  }
  .phone-display {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 16px;
    overflow: hidden;
  }
  .phone-display .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0284c7 0%, #0f172a 100%);
    color: white;
    text-align: center;
    padding: 10px;
  }

  .placeholder-icon { font-size: 32px; margin-bottom: 6px; }
  .placeholder-icon-lg { font-size: 40px; margin-bottom: 8px; }
  .placeholder h3 { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
  .placeholder h2 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .placeholder p { font-size: 9px; opacity: 0.6; line-height: 1.4; }
  .placeholder p.sm { font-size: 8px; }

  .title {
    text-align: center;
    color: white;
    margin-top: 40px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    backdrop-filter: blur(10px);
    max-width: 90%;
  }
  .instructions code {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div>
    <div class="scene">
      <!-- Monitor -->
      <div class="monitor">
        <div class="monitor-screen">
          <div class="monitor-display">
            <div class="placeholder">
              <div class="placeholder-icon-lg">🖥️</div>
              <h2>RentalHub NG</h2>
              <p>Website screenshot</p>
            </div>
          </div>
        </div>
        <div class="monitor-neck"></div>
        <div class="monitor-base"></div>
      </div>

      <!-- Laptop -->
      <div class="laptop">
        <div class="laptop-screen">
          <div class="laptop-display">
            <div class="placeholder">
              <div class="placeholder-icon">💻</div>
              <h3>RentalHub NG</h3>
              <p>Website screenshot</p>
            </div>
          </div>
        </div>
        <div class="laptop-base"></div>
      </div>

      <!-- Tablet -->
      <div class="tablet">
        <div class="tablet-device">
          <div class="tablet-display">
            <div class="placeholder">
              <div class="placeholder-icon">📱</div>
              <h3>RentalHub</h3>
              <p class="sm">App screenshot</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Phone -->
      <div class="phone">
        <div class="phone-device">
          <div class="phone-notch"></div>
          <div class="phone-display">
            <div class="placeholder">
              <div class="placeholder-icon">📱</div>
              <h3 style="font-size:11px;">RentalHub</h3>
              <p class="sm">App screenshot</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="title">Available on All Devices</div>
  </div>

  <div class="instructions">
    Replace each <code>.placeholder</code> div with <code>&lt;img src="screenshot.png" /&gt;</code> → open in browser → screenshot
  </div>
</body>
</html>
