<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalHub — Laptop Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0284c7 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 40px 20px;
  }

  .laptop-wrapper {
    position: relative;
    width: 700px;
  }

  /* Laptop Screen */
  .laptop-screen {
    width: 660px;
    height: 420px;
    background: #1a1a1a;
    border-radius: 16px 16px 0 0;
    padding: 14px 14px 8px 14px;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2;
  }
  .laptop-camera {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: #333;
    border-radius: 50%;
  }
  .laptop-display {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 4px;
    overflow: hidden;
  }
  .laptop-display img,
  .laptop-display .placeholder {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0284c7 0%, #0f172a 100%);
    color: white;
    text-align: center;
    padding: 40px;
  }
  .placeholder .logo { font-size: 56px; margin-bottom: 16px; }
  .placeholder h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .placeholder p { font-size: 13px; opacity: 0.7; line-height: 1.6; }

  /* Laptop Base (keyboard area) */
  .laptop-base {
    width: 740px;
    height: 18px;
    background: linear-gradient(180deg, #c0c0c0 0%, #a0a0a0 50%, #888 100%);
    border-radius: 0 0 8px 8px;
    margin-left: -40px;
    position: relative;
    z-index: 1;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .laptop-base::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 6px;
    background: #999;
    border-radius: 0 0 6px 6px;
  }

  /* Reflection */
  .laptop-wrapper::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 40px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.2) 0%, transparent 70%);
  }

  .label {
    text-align: center;
    color: white;
    margin-top: 40px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .instructions code {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div>
    <div class="laptop-wrapper">
      <div class="laptop-screen">
        <div class="laptop-camera"></div>
        <div class="laptop-display">
          <!-- REPLACE THIS div WITH: <img src="your-screenshot.png" alt="RentalHub" /> -->
          <div class="placeholder">
            <div class="logo">🏠</div>
            <h2>RentalHub NG</h2>
            <p>Replace this with your website screenshot.<br>Just paste an &lt;img&gt; tag inside .laptop-display.</p>
          </div>
        </div>
      </div>
      <div class="laptop-base"></div>
    </div>
    <div class="label">Laptop Mockup</div>
  </div>

  <div class="instructions">
    To use: Screenshot your website → save as <code>screenshot.png</code> → replace placeholder with <code>&lt;img src="screenshot.png" /&gt;</code> → open in browser → screenshot
  </div>
</body>
</html>
