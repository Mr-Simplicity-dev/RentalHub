<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalHub — Desktop Monitor Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0284c7 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 40px 20px;
  }

  .monitor-wrapper {
    position: relative;
  }

  /* Monitor */
  .monitor {
    width: 700px;
    height: 460px;
    background: #1a1a1a;
    border-radius: 16px;
    padding: 16px 16px 10px 16px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 2px #333;
    position: relative;
  }
  .monitor-camera {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: #333;
    border-radius: 50%;
  }
  .monitor-screen {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 4px;
    overflow: hidden;
  }
  .monitor-screen img,
  .monitor-screen .placeholder {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0284c7 0%, #0f172a 100%);
    color: white;
    text-align: center;
    padding: 40px;
  }
  .placeholder .logo { font-size: 64px; margin-bottom: 16px; }
  .placeholder h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .placeholder p { font-size: 13px; opacity: 0.7; line-height: 1.6; }

  /* Monitor Stand */
  .monitor-neck {
    width: 60px;
    height: 60px;
    background: linear-gradient(180deg, #a0a0a0 0%, #888 100%);
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .monitor-neck::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 12px;
    background: linear-gradient(180deg, #a0a0a0 0%, #888 100%);
    border-radius: 4px;
  }

  /* Base */
  .monitor-base {
    width: 200px;
    height: 10px;
    background: linear-gradient(180deg, #999 0%, #777 100%);
    margin: 8px auto 0;
    border-radius: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  /* Reflection */
  .monitor-wrapper::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.15) 0%, transparent 70%);
  }

  .label {
    text-align: center;
    color: white;
    margin-top: 30px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .instructions code {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="monitor-wrapper">
    <div class="monitor">
      <div class="monitor-camera"></div>
      <div class="monitor-screen">
        <!-- REPLACE THIS div WITH: <img src="your-screenshot.png" alt="RentalHub" /> -->
        <div class="placeholder">
          <div class="logo">🏠</div>
          <h2>RentalHub NG</h2>
          <p>Replace this with your website screenshot.<br>Just paste an &lt;img&gt; tag inside .monitor-screen.</p>
        </div>
      </div>
    </div>
    <div class="monitor-neck"></div>
    <div class="monitor-base"></div>
    <div class="label">Desktop Monitor Mockup</div>
  </div>

  <div class="instructions">
    To use: Screenshot your website → save as <code>screenshot.png</code> → replace placeholder with <code>&lt;img src="screenshot.png" /&gt;</code> → open in browser → screenshot
  </div>
</body>
</html>
