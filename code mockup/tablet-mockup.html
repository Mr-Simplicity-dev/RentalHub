<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentalHub — Tablet Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0284c7 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 40px 20px;
  }

  /* Tablet Device */
  .tablet {
    width: 600px;
    height: 440px;
    background: #1a1a1a;
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 2px #333;
    position: relative;
  }
  .tablet-camera {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    background: #333;
    border-radius: 50%;
    z-index: 10;
  }
  .tablet-screen {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 10px;
    overflow: hidden;
  }
  .tablet-screen img,
  .tablet-screen .placeholder {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0284c7 0%, #0f172a 100%);
    color: white;
    text-align: center;
    padding: 40px;
  }
  .placeholder .logo { font-size: 64px; margin-bottom: 20px; }
  .placeholder h2 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
  .placeholder p { font-size: 14px; opacity: 0.7; line-height: 1.6; }

  .label {
    text-align: center;
    color: white;
    margin-top: 24px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .instructions code {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div>
    <div class="tablet">
      <div class="tablet-camera"></div>
      <div class="tablet-screen">
        <!-- REPLACE THIS div WITH: <img src="your-screenshot.png" alt="RentalHub" /> -->
        <div class="placeholder">
          <div class="logo">🏠</div>
          <h2>RentalHub NG</h2>
          <p>Replace this with your tablet/app screenshot.<br>Just paste an &lt;img&gt; tag inside .tablet-screen.</p>
        </div>
      </div>
    </div>
    <div class="label">Tablet Mockup</div>
  </div>

  <div class="instructions">
    To use: Take a screenshot → save as <code>screenshot.png</code> → replace placeholder with <code>&lt;img src="screenshot.png" /&gt;</code> → open in browser → screenshot
  </div>
</body>
</html>
