# RentalHub — nginx production config
# Place in /etc/nginx/sites-available/rentalhub
# ln -s /etc/nginx/sites-available/rentalhub /etc/nginx/sites-enabled/

upstream rentalhub_backend {
  server 127.0.0.1:5000;
  keepalive 64;
}

server {
  listen 80;
  server_name yourdomain.com www.yourdomain.com;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  server_name yourdomain.com www.yourdomain.com;

  ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

  # Upload limits
  client_max_body_size 5m;
  client_body_timeout 30s;

  # Static files — cache aggressively
  location /static/ {
    root /path/to/rentalhub/client/build;
    expires 1y;
    add_header Cache-Control "public, immutable";
    limit_req zone=static burst=200 nodelay;
  }

  location / {
    root /path/to/rentalhub/client/build;
    try_files $uri $uri/ /index.html;
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # API proxy
  location /api/ {
    limit_req zone=api burst=50 nodelay;
    proxy_pass http://rentalhub_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_buffering off;
  }

  # Socket.io
  location /socket.io/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://rentalhub_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
  }

  # Uploads (ad-spaces only — public)
  location /uploads/ {
    alias /path/to/rentalhub/uploads/;
    expires 1d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options nosniff;
    limit_req zone=static burst=100 nodelay;
  }
}
