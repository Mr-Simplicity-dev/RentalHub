name: Build Mobile Apps

on:
  push:
    branches: [main]
    paths:
      - 'RentalHubMobile/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (android, ios, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump-version:
    name: Bump Build Number
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RentalHubMobile
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

  build-android:
    name: Build Android APK
    needs: bump-version
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RentalHubMobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: RentalHubMobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build APK with EAS
        run: npx eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-ios:
    name: Build iOS IPA
    needs: bump-version
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RentalHubMobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: RentalHubMobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build IPA with EAS
        run: npx eas build -p ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
