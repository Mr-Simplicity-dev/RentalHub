name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm audit
        continue-on-error: true
